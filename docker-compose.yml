services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: didge-belgique:latest
    restart: unless-stopped
    # Pas de port publié : Dokploy route via Traefik (Domains -> serviceName: app, port 3000).
    # Test local : docker compose -f docker-compose.yml -f docker-compose.local.yml up
    environment:
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_LIST_ID: ${BREVO_LIST_ID}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME}
      WHATSAPP_INVITE_URL: ${WHATSAPP_INVITE_URL}
      POCKETBASE_URL: http://pocketbase:8090
      PORT: 3000
      STATIC_ROOT: /app/public
    depends_on:
      - pocketbase

  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
    image: didge-pocketbase:latest
    restart: unless-stopped
    environment:
      APP_URL: ${APP_URL:-https://didgeridoo.top}
      SMTP_HOST: ${SMTP_HOST:-smtp-relay.brevo.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_SENDER: ${SMTP_SENDER:-didgeridoo@mirko.re}
    ports:
      # Admin UI (/_/) : accès via tunnel SSH uniquement, jamais exposé au public.
      - "127.0.0.1:8090:8090"
    volumes:
      # Volume nommé obligatoire : Dokploy re-clone le repo à chaque deploy,
      # un bind mount relatif (./pb_data) serait effacé. Migrations/hooks sont
      # dans l'image (COPY, versionnés) ; en dev le compose.dev les bind-mounte.
      - pb_data:/pb/pb_data

  pb-backup:
    image: alpine:3.21
    restart: unless-stopped
    volumes:
      - pb_data:/pb_data:ro
      - pb_backups:/backups
    # tar quotidien de pb_data, rétention 14 jours
    command: sh -c 'while true; do tar czf /backups/pb_data-$$(date +%F).tar.gz -C / pb_data && find /backups -name "pb_data-*.tar.gz" -mtime +14 -delete; sleep 86400; done'

volumes:
  pb_data:
  pb_backups:
