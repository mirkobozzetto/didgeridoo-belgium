services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: didge-belgique:latest
    restart: unless-stopped
    ports:
      # Expose en local sur 3000. Derrière ton reverse proxy (Nginx/Caddy/Traefik),
      # tu peux mapper "127.0.0.1:3000:3000" pour ne pas exposer directement.
      - "3000:3000"
    environment:
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_LIST_ID: ${BREVO_LIST_ID}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME}
      WHATSAPP_INVITE_URL: ${WHATSAPP_INVITE_URL}
      POCKETBASE_URL: http://pocketbase:8090
      PORT: 3000
      STATIC_ROOT: /app/public
    depends_on:
      - pocketbase

  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
    image: didge-pocketbase:latest
    restart: unless-stopped
    ports:
      # Admin UI (/_/) : accès via tunnel SSH uniquement, jamais exposé au public.
      - "127.0.0.1:8090:8090"
    volumes:
      - ./pb_data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations
      - ./pb_hooks:/pb/pb_hooks

  pb-backup:
    image: alpine:3.21
    restart: unless-stopped
    volumes:
      - ./pb_data:/pb_data:ro
      - ./backups:/backups
    # tar quotidien de pb_data, rétention 14 jours
    command: >
      sh -c 'while true; do
        tar czf /backups/pb_data-$$(date +%F).tar.gz -C / pb_data
        && find /backups -name "pb_data-*.tar.gz" -mtime +14 -delete;
        sleep 86400;
      done'
